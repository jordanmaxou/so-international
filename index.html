                    de: { title: "Globale Grands Crus: Einfluss des Klimawandels", excerpt: "Wie Top-Güter ihre Cuvées für die Zukunft anpassen...", body: ["Cabernet verdrängt den Merlot in einigen Cuvées.", "AD_SLOT", "Technologie hilft, Wetterereignisse präzise vorherzusagen."] }
                }
            },
            {
                id: 20, category: 'wine', source: 'Terre de Vins', author: 'TdV Staff', originalUrl: '#', date: '2024-04-24',
                img: 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&q=80&w=800',
                translations: {
                    en: { title: "Wine Tourism: The rise of luxury lodging", excerpt: "More Châteaux are opening high-end hotels inside their walls...", body: ["Experience-based tourism is the new trend for luxury brands.", "AD_SLOT", "Guests want to live the life of a winemaker for a few days."] },
                    es: { title: "Enoturismo: El auge del alojamiento de lujo", excerpt: "Más castillos abren hoteles de alta gama en sus muros...", body: ["El turismo de experiencias es la nueva tendencia de lujo.", "AD_SLOT", "Los huéspedes quieren vivir como un viticultor unos días."] },
                    de: { title: "Weintourismus: Boom der Luxusunterkünfte", excerpt: "Immer mehr Châteaux eröffnen Nobelhotels in ihren Mauern...", body: ["Erlebnistourismus ist der neue Trend im Luxussegment.", "AD_SLOT", "Gäste wollen das Leben eines Winzers hautnah erleben."] }
                }
            },
            {
                id: 21, category: 'wine', source: 'Terre de Vins', author: 'S. Dubos', originalUrl: '#', date: '2024-04-23',
                img: 'https://images.unsplash.com/photo-1510850431481-7a2ba2d32ea0?auto=format&fit=crop&q=80&w=800',
                translations: {
                    en: { title: "Sparkling Wines: South-West bubbles on the rise", excerpt: "Crémant production is growing as an alternative to Champagne...", body: ["Local sparkling wines are winning medals in international contests.", "AD_SLOT", "The quality-price ratio is unbeatable for these traditional method wines."] },
                    es: { title: "Espumosos: Burbujas del suroeste al alza", excerpt: "La producción de Crémant crece como alternativa al Champagne...", body: ["Los espumosos locales ganan medallas internacionales.", "AD_SLOT", "La relación calidad-precio es imbatible para estos vinos."] },
                    de: { title: "Schaumweine: Aufstieg der Südwest-Bubbles", excerpt: "Die Crémant-Produktion wächst als Alternative zum Champagner...", body: ["Lokale Schaumweine gewinnen internationale Medaillen.", "AD_SLOT", "Das Preis-Leistungs-Verhältnis ist bei diesen Weinen unschlagbar."] }
                }
            }
        ];

        const sourcesList = ['Sud Ouest', 'Charente Libre', 'La République des Pyrénées', 'Dordogne Libre', 'Haute Gironde', 'La Dépêche du Bassin', 'Terre de Vins'];

        // --- MOTEUR DE RENDU ---
        function render() {
            const app = document.getElementById('app');
            const langContent = content[state.lang];

            if (state.view === 'article' && state.selectedArticle) {
                app.innerHTML = renderArticlePage(langContent, state.selectedArticle);
            } else {
                app.innerHTML = renderListPage(langContent);
            }
            lucide.createIcons();
        }

        function renderListPage(langContent) {
            const filtered = articles.filter(art => 
                (state.category === 'all' || art.category === state.category) && 
                (state.source === 'all' || art.source === state.source)
            );

            return `
                ${renderHeader()}
                ${renderSourceBar(langContent)}
                <main class="max-w-7xl mx-auto px-4 py-6">
                    <div class="bg-slate-100 border border-slate-200 flex flex-col items-center justify-center text-slate-400 rounded h-24 mb-8">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="megaphone" size="14"></i><span class="text-[9px] font-bold uppercase tracking-widest">${langContent.adLabel}</span></div>
                        <div class="text-xs italic">Leaderboard 728x90</div>
                    </div>

                    <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between border-b-2 border-slate-900 pb-4">
                        <p class="text-slate-500 font-medium italic text-lg">${langContent.tagline}</p>
                        <div class="text-xs font-bold text-slate-400 uppercase mt-2 md:mt-0">${new Date().toLocaleDateString(state.lang, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    </div>

                    <!-- Hero Section -->
                    ${state.category === 'all' && state.source === 'all' && filtered.length > 0 ? `
                        <div onclick="openArticle(${filtered[0].id})" class="mb-12 grid grid-cols-1 lg:grid-cols-12 gap-0 rounded-xl overflow-hidden border border-slate-200 bg-white shadow-xl group cursor-pointer">
                            <div class="lg:col-span-8 relative h-[400px] lg:h-[500px] overflow-hidden">
                                <img src="${filtered[0].img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                <div class="absolute top-4 left-4"><span class="bg-[#005da3] text-white px-3 py-1 text-xs font-black uppercase italic tracking-tighter">${filtered[0].source}</span></div>
                            </div>
                            <div class="lg:col-span-4 p-8 flex flex-col justify-center bg-[#f8f9fa]">
                                <span class="text-[#005da3] font-black uppercase text-sm mb-4 tracking-tighter">${langContent.categories[filtered[0].category]}</span>
                                <h2 class="text-3xl font-black text-slate-900 mb-6 leading-none italic uppercase">${filtered[0].translations[state.lang].title}</h2>
                                <p class="text-slate-600 text-lg mb-8 leading-relaxed">${filtered[0].translations[state.lang].excerpt}</p>
                                <button class="w-full bg-slate-900 text-white px-8 py-4 font-black italic uppercase transition-colors flex items-center justify-center gap-2 hover:bg-[#005da3]">
                                    ${langContent.readMore} <i data-lucide="external-link" size="18"></i>
                                </button>
                            </div>
                        </div>
                    ` : ''}

                    <!-- Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                        ${filtered.slice(state.category === 'all' && state.source === 'all' ? 1 : 0).map((art, idx) => `
                            ${idx > 0 && idx % 6 === 0 ? `
                                <div class="bg-slate-100 border border-slate-200 flex flex-col items-center justify-center text-slate-400 rounded h-80">
                                    <div class="flex items-center gap-2 mb-1"><i data-lucide="megaphone" size="14"></i><span class="text-[9px] font-bold uppercase tracking-widest">${langContent.adLabel}</span></div>
                                    <div class="text-xs italic">Rectangle 300x250</div>
                                </div>
                            ` : ''}
                            <article onclick="openArticle(${art.id})" class="bg-white group flex flex-col cursor-pointer">
                                <div class="relative h-64 overflow-hidden mb-4 rounded-lg bg-slate-100">
                                    <img src="${art.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                    <div class="absolute bottom-0 left-0 bg-[#005da3] text-white px-2 py-1 text-[10px] font-black uppercase italic">${art.source}</div>
                                    <div class="absolute top-0 right-0 bg-white/90 backdrop-blur-sm px-2 py-1 text-[8px] font-bold text-slate-500 flex items-center gap-1 uppercase tracking-tighter">
                                        <i data-lucide="info" size="10"></i> ${langContent.aiNotice}
                                    </div>
                                </div>
                                <div class="flex flex-col flex-grow">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-[#005da3] text-[11px] font-black uppercase tracking-wider italic">${langContent.categories[art.category]}</span>
                                        <span class="text-green-600 text-[10px] font-black border border-green-200 px-1.5 py-0.5 rounded bg-green-50 uppercase italic">${langContent.free}</span>
                                    </div>
                                    <h3 class="text-xl font-black text-slate-900 mb-3 group-hover:text-[#005da3] transition-colors leading-tight italic uppercase">${art.translations[state.lang].title}</h3>
                                    <p class="text-slate-600 text-sm mb-4 line-clamp-3 leading-relaxed">${art.translations[state.lang].excerpt}</p>
                                    <div class="mt-auto flex justify-between items-center text-slate-400 text-[10px] font-bold uppercase border-t border-slate-50 pt-4">
                                        <span>${art.date}</span>
                                        <span class="flex items-center gap-1 text-slate-900 font-black italic">${langContent.readMore} <i data-lucide="external-link" size="12"></i></span>
                                    </div>
                                </div>
                            </article>
                        `).join('')}
                    </div>
                </main>
                ${renderFooter()}
            `;
        }

        function renderArticlePage(langContent, art) {
            return `
                ${renderHeader()}
                <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-12">
                    <div class="lg:col-span-8">
                        <div class="mb-4">
                             <button onclick="changeView('list')" class="text-slate-500 hover:text-[#005da3] transition-colors flex items-center gap-1 font-bold text-xs uppercase tracking-tighter mb-4">
                                <i data-lucide="arrow-left" size="16"></i> ${langContent.backToList}
                            </button>
                        </div>
                        <div class="mb-6 flex gap-2">
                           <span class="bg-[#005da3] text-white px-3 py-1 text-[10px] font-black uppercase italic">${art.source}</span>
                           <span class="text-[#005da3] font-black uppercase text-[10px] border border-[#005da3] px-2 py-1 italic tracking-tighter">${langContent.categories[art.category]}</span>
                        </div>
                        <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-6 italic uppercase leading-none">${art.translations[state.lang].title}</h1>
                        
                        <div class="flex items-center justify-between py-4 border-y border-slate-100 mb-8 text-slate-400 text-xs font-bold uppercase">
                          <div class="flex items-center gap-4">
                            <span class="flex items-center gap-1 text-slate-900"><i data-lucide="user" size="14"></i> ${art.author || 'Sud Ouest Staff'}</span>
                            <span class="flex items-center gap-1"><i data-lucide="clock" size="14"></i> 4 min read</span>
                            <span>${art.date}</span>
                          </div>
                          <div class="flex gap-2">
                             <a href="${art.originalUrl || '#'}" target="_blank" class="flex items-center gap-1 text-[#005da3] hover:underline">
                                ${langContent.viewOriginal} <i data-lucide="external-link" size="12"></i>
                             </a>
                          </div>
                        </div>

                        <img src="${art.img}" class="w-full h-auto rounded-xl mb-8" />
                        
                        <div class="bg-blue-50 border-l-4 border-[#005da3] p-4 mb-8 flex items-start gap-3">
                            <i data-lucide="info" size="20" class="text-[#005da3] shrink-0 mt-0.5"></i>
                            <p class="text-xs text-slate-600 leading-relaxed font-medium">${langContent.aiDisclaimer}</p>
                        </div>

                        <div class="prose prose-slate max-w-none">
                            <p class="text-xl font-bold text-slate-700 mb-8">${art.translations[state.lang].excerpt}</p>
                            
                            ${art.translations[state.lang].body.map(para => {
                                if (para === 'AD_SLOT') {
                                    return `
                                        <div class="bg-slate-50 border border-slate-200 flex flex-col items-center justify-center text-slate-400 rounded h-64 my-10">
                                            <div class="flex items-center gap-2 mb-1"><i data-lucide="megaphone" size="14"></i><span class="text-[9px] font-bold uppercase tracking-widest">${langContent.adLabel}</span></div>
                                            <div class="text-xs italic">Inline Rectangle 300x250</div>
                                        </div>
                                    `;
                                }
                                return `<p class="text-lg text-slate-800 leading-loose mb-6">${para}</p>`;
                            }).join('')}
                        </div>
                    </div>
                    <div class="lg:col-span-4">
                        <div class="bg-slate-100 border border-slate-200 flex flex-col items-center justify-center text-slate-400 rounded h-80 sticky top-24">
                            <div class="flex items-center gap-2 mb-1"><i data-lucide="megaphone" size="14"></i><span class="text-[9px] font-bold uppercase tracking-widest">${langContent.adLabel}</span></div>
                            <div class="text-xs italic">Rectangle 300x600</div>
                        </div>
                    </div>
                </main>
                ${renderFooter()}
            `;
        }

        function renderHeader() {
            return `
                <header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
                    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                        <div onclick="changeView('list')" class="flex items-center gap-3 cursor-pointer">
                            <div class="bg-[#005da3] text-white p-2 rounded flex flex-col items-center justify-center leading-none">
                                <span class="text-xl font-black italic tracking-tighter">SO</span>
                            </div>
                            <div class="hidden sm:flex flex-col">
                                <span class="text-2xl font-black italic text-[#005da3] tracking-tighter leading-none uppercase">Sud Ouest</span>
                                <span class="text-[10px] font-bold text-red-600 tracking-[0.2em] leading-none uppercase">International</span>
                            </div>
                        </div>
                        <nav class="hidden md:flex items-center gap-8 font-bold text-sm uppercase tracking-tight text-slate-600">
                            <button onclick="setCategory('all')" class="${state.category === 'all' ? 'text-[#005da3] border-b-4 border-[#005da3] pt-1' : ''}">All</button>
                            <button onclick="setCategory('food')" class="${state.category === 'food' ? 'text-[#005da3] border-b-4 border-[#005da3] pt-1' : ''}">Gastronomy</button>
                            <button onclick="setCategory('wine')" class="${state.category === 'wine' ? 'text-[#005da3] border-b-4 border-[#005da3] pt-1' : ''}">Wine</button>
                            <button onclick="setCategory('realestate')" class="${state.category === 'realestate' ? 'text-[#005da3] border-b-4 border-[#005da3] pt-1' : ''}">Real Estate</button>
                        </nav>
                        <select onchange="changeLang(this.value)" class="bg-slate-50 border border-slate-200 px-3 py-2 rounded font-black text-sm uppercase outline-none">
                            <option value="en" ${state.lang === 'en' ? 'selected' : ''}>EN</option>
                            <option value="es" ${state.lang === 'es' ? 'selected' : ''}>ES</option>
                            <option value="de" ${state.lang === 'de' ? 'selected' : ''}>DE</option>
                        </select>
                    </div>
                </header>
            `;
        }

        function renderSourceBar(langContent) {
            return `
                <div class="bg-white border-b border-slate-100 overflow-x-auto scrollbar-hide">
                    <div class="max-w-7xl mx-auto px-4 py-3 flex gap-3 text-xs items-center whitespace-nowrap font-bold uppercase italic">
                        <span class="text-slate-400 tracking-widest mr-2">${langContent.sources}:</span>
                        <button onclick="setSource('all')" class="px-3 py-1.5 rounded ${state.source === 'all' ? 'bg-[#005da3] text-white' : 'bg-slate-100 text-slate-600'}">All</button>
                        ${sourcesList.map(s => `
                            <button onclick="setSource('${s}')" class="px-3 py-1.5 rounded ${state.source === s ? 'bg-[#005da3] text-white' : 'bg-slate-100 text-slate-600'}">${s}</button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFooter() {
            return `
                <footer class="bg-slate-900 text-white mt-20 py-16">
                    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-12 text-center md:text-left mb-12">
                        <div class="col-span-1 md:col-span-2">
                            <div class="flex items-center justify-center md:justify-start gap-3 mb-8">
                                <div class="bg-white text-[#005da3] p-2 rounded flex flex-col items-center justify-center leading-none">
                                    <span class="text-xl font-black italic tracking-tighter uppercase">SO</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-2xl font-black italic text-white tracking-tighter leading-none uppercase">Sud Ouest</span>
                                    <span class="text-[10px] font-bold text-red-600 tracking-[0.2em] leading-none uppercase">International</span>
                                </div>
                            </div>
                            <p class="text-slate-400 max-w-sm text-sm mx-auto md:mx-0">
                                The international gateway to France's premier regional news network. Powered by advanced AI translation for a global audience.
                            </p>
                        </div>
                        <div>
                            <h4 class="font-black mb-6 text-white uppercase text-xs tracking-[0.2em] border-b border-slate-800 pb-2 italic">Network</h4>
                            <ul class="space-y-3 text-slate-400 text-[10px] font-bold uppercase">
                                ${sourcesList.map(s => `<li class="hover:text-white cursor-pointer">${s}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="font-black mb-6 text-white uppercase text-xs tracking-[0.2em] border-b border-slate-800 pb-2 italic">Legal</h4>
                            <ul class="space-y-3 text-slate-400 text-[10px] font-bold uppercase">
                                <li class="hover:text-white cursor-pointer">About AI Translation</li>
                                <li class="hover:text-white cursor-pointer">Privacy Policy</li>
                                <li class="hover:text-white cursor-pointer">Terms of Service</li>
                                <li class="hover:text-white cursor-pointer">Contact Us</li>
                            </ul>
                        </div>
                    </div>
                    <div class="max-w-7xl mx-auto px-4 pt-8 border-t border-slate-800 text-center text-slate-500 text-[9px] font-bold uppercase tracking-widest">
                        © 2024 Groupe Sud Ouest. Internal export version.
                    </div>
                </footer>
            `;
        }

        // --- ACTIONS ---
        window.changeLang = (l) => { state.lang = l; render(); };
        window.setCategory = (c) => { state.category = c; state.view = 'list'; render(); };
        window.setSource = (s) => { state.source = s; state.view = 'list'; render(); };
        window.changeView = (v) => { state.view = v; render(); window.scrollTo(0,0); };
        window.openArticle = (id) => { state.selectedArticle = articles.find(a => a.id === id); changeView('article'); };

        // --- INIT ---
        render();

    </script>
</body>
</html>
